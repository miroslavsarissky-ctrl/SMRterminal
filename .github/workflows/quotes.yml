name: market-quotes

on:
  schedule:
    # 22:35 UTC weekdays: comfortably after US market close year-round.
    - cron: "35 22 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: terminal-data
  cancel-in-progress: false

jobs:
  quotes:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch market quotes
        run: python terminal/collectors/quotes.py

      - name: Fetch deal filings
        run: python terminal/collectors/deal.py

      - name: Fetch legislation
        env:
          API_DATA_GOV_KEY: ${{ secrets.API_DATA_GOV_KEY }}
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
        run: python terminal/collectors/congress.py

      - name: Commit data
        run: |
          git config user.name "quotes-bot"
          git config user.email "actions@users.noreply.github.com"
          git add terminal/data/quotes.js terminal/data/deal.js terminal/data/legislation.js
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "data: quotes, deal and legislation update"
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            git pull --rebase
            sleep 5
          done
          echo "Push failed after retries" >&2
          exit 1
