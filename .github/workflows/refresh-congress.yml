name: refresh-congress
# Daily legislation tracker: tracked bills (REFUEL Act pair) with latest actions plus a
# keyword scan of recently-updated bills in the current Congress. Uses the api.data.gov key.

on:
  schedule:
    - cron: '10 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install requests
      - name: Collect legislation
        env:
          API_DATA_GOV_KEY: ${{ secrets.API_DATA_GOV_KEY }}
        run: python terminal/collectors/collect_congress.py terminal/data
      - name: Commit refreshed data
        run: |
          git config user.name "intel-terminal-bot"
          git config user.email "actions@users.noreply.github.com"
          git add terminal/data/congress.json terminal/data/congress.js
          git diff --cached --quiet || git commit -m "congress: daily legislation refresh"
          git push
