name: refresh-intel
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: refresh
  cancel-in-progress: false
jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install requests feedparser
      - name: Collect
        env:
          SAM_GOV_API_KEY: ${{ secrets.SAM_GOV_API_KEY }}
          X_BEARER_TOKEN:  ${{ secrets.X_BEARER_TOKEN }}
        run: python terminal/collectors/collect.py
      - name: Commit data
        run: |
          git config user.name "intel-bot"
          git config user.email "intel-bot@users.noreply.github.com"
          git add terminal/data/
          git diff --cached --quiet || git commit -m "refresh $(date -u +'%Y-%m-%d %H:%M')"
          git push
