name: refresh-intel
on:
  schedule:
    - cron: "7,37 * * * *"
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: refresh
  cancel-in-progress: false
jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install requests feedparser
      - name: Collect
        env:
          SAM_GOV_API_KEY: ${{ secrets.SAM_GOV_API_KEY }}
          X_BEARER_TOKEN:  ${{ secrets.X_BEARER_TOKEN }}
          NRC_APS_KEY:     ${{ secrets.NRC_APS_KEY }}
          API_DATA_GOV_KEY:  ${{ secrets.API_DATA_GOV_KEY }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: python terminal/collectors/collect.py
      - name: Commit data
        run: |
          git config user.name "intel-bot"
          git config user.email "intel-bot@users.noreply.github.com"
          git add terminal/data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "refresh $(date -u +'%Y-%m-%d %H:%M')"
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            git pull --rebase
            sleep 5
          done
          echo "Push failed after retries" >&2
          exit 1
